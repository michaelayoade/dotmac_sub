<section class="flex min-w-0 flex-1 flex-col items-center justify-center overflow-y-auto px-6 py-10 text-center" data-inbox-empty-state>
    <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-amber-100 to-orange-100 text-orange-600 ring-1 ring-amber-200 dark:from-amber-950/40 dark:to-orange-950/30 dark:text-amber-300 dark:ring-amber-800">
        <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M8 10h8m-8 4h5m8-2a9 9 0 11-4.5-7.8L21 3v5h-5"/></svg>
    </div>
    <h2 class="mt-4 font-display text-xl font-semibold text-slate-900 dark:text-white">Your customer conversations, in one place</h2>
    <p class="mt-2 max-w-md text-sm leading-6 text-slate-500 dark:text-slate-400">Select a conversation to read the thread, reply, collaborate privately, and review customer context without leaving the inbox.</p>
    <div class="mt-6 grid w-full max-w-xl grid-cols-1 gap-2 sm:grid-cols-2">
        <button type="button" @click="applyAssignmentFilter('attention')" class="flex min-h-12 items-center justify-between rounded-lg border border-slate-200 bg-white px-4 text-left text-sm font-semibold text-slate-700 hover:border-amber-300 hover:bg-amber-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800">
            <span>Needs attention</span><span class="rounded-lg bg-amber-100 px-2 py-0.5 text-xs text-amber-800 dark:bg-amber-900/40 dark:text-amber-200">{{ assignment_counts.needs_attention }}</span>
        </button>
        <button type="button" @click="applyAssignmentFilter('unreplied')" class="flex min-h-12 items-center justify-between rounded-lg border border-slate-200 bg-white px-4 text-left text-sm font-semibold text-slate-700 hover:border-amber-300 hover:bg-amber-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800">
            <span>Unreplied</span><span class="rounded-lg bg-slate-100 px-2 py-0.5 text-xs text-slate-600 dark:bg-slate-800 dark:text-slate-300">{{ assignment_counts.unreplied }}</span>
        </button>
        <button type="button" @click="navigateFilter({open_only: 'true'})" class="flex min-h-12 items-center justify-between rounded-lg border border-slate-200 bg-white px-4 text-left text-sm font-semibold text-slate-700 hover:border-amber-300 hover:bg-amber-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800">
            <span>Open conversations</span><span class="rounded-lg bg-slate-100 px-2 py-0.5 text-xs text-slate-600 dark:bg-slate-800 dark:text-slate-300">{{ queue_metrics.total_open }}</span>
        </button>
        <button type="button" @click="openNewConversation()" class="flex min-h-12 items-center justify-between rounded-lg bg-gradient-to-r from-amber-500 to-orange-600 px-4 text-left text-sm font-semibold text-white hover:from-amber-600 hover:to-orange-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500 focus-visible:ring-offset-2">
            <span>New conversation</span><svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        </button>
    </div>
    <p class="mt-6 text-xs text-slate-400"><kbd class="rounded border border-slate-300 px-1.5 py-0.5 dark:border-slate-700">j</kbd>/<kbd class="rounded border border-slate-300 px-1.5 py-0.5 dark:border-slate-700">k</kbd> move · <kbd class="rounded border border-slate-300 px-1.5 py-0.5 dark:border-slate-700">?</kbd> shortcuts</p>
</section>
