{% extends "layouts/admin.html" %}

{% block title %}Create Secret - Admin{% endblock %}

{% block content %}
<div class="space-y-6" x-data="{ fields: [{key: '', val: ''}] }">
    <div>
        <nav class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400 mb-2">
            <a href="/admin/system/secrets" class="hover:text-slate-700 dark:hover:text-slate-300">Secrets</a>
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            <span class="text-slate-900 dark:text-white">New Secret</span>
        </nav>
        <h1 class="text-2xl font-display font-bold text-slate-900 dark:text-white">Create Secret</h1>
        <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Store a new secret in OpenBao. Reference with <code class="rounded bg-slate-100 px-1.5 py-0.5 text-xs dark:bg-slate-700">bao://secret/&lt;path&gt;#&lt;field&gt;</code></p>
    </div>

    {% if error %}
    <div class="rounded-xl border border-rose-200 bg-rose-50 p-4 text-sm font-medium text-rose-800 dark:border-rose-800 dark:bg-rose-900/20 dark:text-rose-300">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/admin/system/secrets/create" class="space-y-6">
        <input type="hidden" name="_csrf_token" value="{{ request.state.csrf_token }}">

        <!-- Path -->
        <div class="rounded-2xl border border-slate-200/60 bg-white p-6 shadow-sm dark:border-slate-700/60 dark:bg-slate-800">
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Secret Path</label>
            <div class="flex items-center gap-2">
                <span class="text-sm font-medium text-slate-500 dark:text-slate-400">secret/</span>
                <input type="text" name="path" placeholder="e.g. smtp, payment/stripe"
                       class="flex-1 rounded-lg border border-slate-300 px-3 py-2 font-mono text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500" required>
            </div>
        </div>

        <!-- Fields -->
        <div class="rounded-2xl border border-slate-200/60 bg-white p-6 shadow-sm dark:border-slate-700/60 dark:bg-slate-800">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-display font-semibold text-slate-900 dark:text-white">Fields</h2>
                <button type="button" @click="fields.push({key: '', val: ''})"
                        class="inline-flex items-center gap-1.5 rounded-lg border border-slate-300 px-3 py-1.5 text-xs font-semibold text-slate-600 hover:bg-slate-50 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-700">
                    <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    Add Field
                </button>
            </div>
            <div class="space-y-3">
                <template x-for="(field, idx) in fields" :key="idx">
                    <div class="grid gap-2 sm:grid-cols-5 sm:items-center">
                        <div class="sm:col-span-2">
                            <input type="text" :name="'key_' + idx" x-model="field.key" placeholder="Field name"
                                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                        </div>
                        <div class="sm:col-span-2">
                            <input type="text" :name="'val_' + idx" x-model="field.val" placeholder="Secret value"
                                   class="w-full rounded-lg border border-slate-300 px-3 py-2 font-mono text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                        </div>
                        <div>
                            <button type="button" @click="fields.length > 1 && fields.splice(idx, 1)"
                                    class="rounded-lg p-2 text-slate-400 hover:bg-rose-100 hover:text-rose-600 dark:hover:bg-rose-900/30 dark:hover:text-rose-400"
                                    :class="fields.length <= 1 && 'opacity-30 cursor-not-allowed'">
                                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div class="flex items-center justify-between">
            <a href="/admin/system/secrets" class="inline-flex items-center gap-2 rounded-xl border-2 border-slate-200 bg-white px-5 py-2.5 text-sm font-semibold text-slate-700 hover:border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300">
                Cancel
            </a>
            <button type="submit" class="inline-flex items-center gap-2 rounded-xl bg-gradient-to-r from-slate-600 to-slate-700 px-6 py-2.5 text-sm font-semibold text-white shadow-lg hover:shadow-xl">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                Create Secret
            </button>
        </div>
    </form>
</div>
{% endblock %}
