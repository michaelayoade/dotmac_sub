{% if error %}
<div class="rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700 dark:border-rose-800 dark:bg-rose-900/20 dark:text-rose-400">
    {{ error }}
</div>
{% else %}
<div class="rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700 dark:border-emerald-800 dark:bg-emerald-900/20 dark:text-emerald-400">
    Bulk <strong>{{ action }}</strong>: {{ stats.succeeded }} succeeded, {{ stats.failed }} failed{{ skipped_text }}.
</div>
{% endif %}
