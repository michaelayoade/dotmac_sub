<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 px-4 py-6 backdrop-blur-sm"
     role="dialog"
     aria-modal="true"
     aria-labelledby="assign-subscriber-modal-title"
     x-data="{ open: true }"
     x-show="open"
     x-transition
     @keydown.escape.window="open = false; $nextTick(() => document.getElementById('modal-container').replaceChildren())">
    <div class="w-full max-w-lg rounded-2xl bg-white p-6 shadow-2xl dark:bg-slate-800"
         @click.outside="open = false; $nextTick(() => document.getElementById('modal-container').replaceChildren())">
        <div class="mb-5 flex items-start justify-between gap-4">
            <div>
                <h3 id="assign-subscriber-modal-title" class="text-lg font-bold text-slate-900 dark:text-white">Assign Subscriber</h3>
                <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Link this ONT to a subscriber account.</p>
            </div>
            <button type="button"
                    @click="open = false; $nextTick(() => document.getElementById('modal-container').replaceChildren())"
                    aria-label="Close modal"
                    class="rounded-lg p-1 text-slate-400 hover:text-slate-600 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-offset-2 dark:hover:text-slate-300 dark:focus:ring-offset-slate-800">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <form method="POST"
              action="{{ action_url }}"
              hx-post="{{ action_url }}"
              hx-target="#modal-container"
              hx-swap="innerHTML">
            {% include "components/forms/csrf_input.html" %}
            <input type="hidden" name="assignment_modal" value="1">

            {% if error %}
            <div class="mb-4 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700 dark:border-rose-800/50 dark:bg-rose-900/20 dark:text-rose-300">
                {{ error }}
            </div>
            {% endif %}

            <div>
                <label for="modal_account_search" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Subscriber Account</label>
                <div class="relative mt-1"
                     data-typeahead-url="/api/v1/search/subscribers"
                     data-typeahead-min="2"
                     data-typeahead-limit="10"
                     data-typeahead-label="subscribers">
                    <input type="text"
                           id="modal_account_search"
                           autocomplete="off"
                           data-typeahead-input
                           value="{{ form.account_label if form else '' }}"
                           placeholder="Search by name, email, or account number..."
                           class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-cyan-500 focus:bg-white focus:text-slate-900 focus:ring-cyan-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white dark:focus:bg-slate-700 dark:focus:text-white">
                    <input type="hidden" name="account_id" data-typeahead-hidden value="{{ form.account_id if form else '' }}">
                    <div data-typeahead-results></div>
                </div>
            </div>

            <div class="mt-4">
                <label for="modal_subscription_search" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Service Subscription</label>
                <div class="relative mt-1" data-typeahead-url="/api/v1/search/subscriptions" data-typeahead-min="2" data-typeahead-limit="10">
                    <input type="text" id="modal_subscription_search" autocomplete="off"
                           data-typeahead-input value="{{ form.subscription_label if form else '' }}"
                           class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-cyan-500 focus:ring-cyan-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                    <input type="hidden" name="subscription_id" data-typeahead-hidden value="{{ form.subscription_id if form else '' }}">
                    <div data-typeahead-results></div>
                </div>
            </div>

            <div class="mt-6 flex items-center justify-end gap-3">
                <button type="button"
                        @click="open = false; $nextTick(() => document.getElementById('modal-container').replaceChildren())"
                        class="rounded-lg px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200">
                    Cancel
                </button>
                <button type="submit"
                        class="inline-flex items-center gap-2 rounded-lg bg-cyan-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition-colors hover:bg-cyan-700 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    Save Profile
                </button>
            </div>
        </form>
    </div>
</div>
