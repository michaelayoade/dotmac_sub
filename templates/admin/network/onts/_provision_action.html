{# HTMX partial: One-click provisioning UI for ONT detail page #}

<div class="space-y-6" x-data="ontProvisioningWidget('{{ ont.id }}')">
    {# Profile Selection & Controls #}
    <div class="rounded-2xl border border-slate-200/60 bg-white p-5 shadow-sm dark:border-slate-700/60 dark:bg-slate-800">
        <h3 class="text-sm font-semibold text-slate-900 dark:text-white mb-4">End-to-End Provisioning</h3>
        <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">
            Select a provisioning profile and execute the full sequence: service-ports, management IP, TR-069 binding, and PPPoE credentials.
        </p>
        <form @submit.prevent="submitProvision($el)" class="space-y-4">
            <div class="grid grid-cols-1 gap-4 sm:grid-cols-3">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Provisioning Profile</label>
                    <select name="profile_id" required class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                        {% for p in profiles %}
                        <option value="{{ p.id }}">{{ p.name }}{% if p.profile_type %} ({{ p.profile_type.value }}){% endif %}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">TR-069 OLT Profile ID</label>
                    <input type="number" name="tr069_profile_id" min="0" max="999" placeholder="Optional" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                </div>
                <div class="flex items-end gap-3">
                    <label class="flex items-center gap-2 text-sm">
                        <input type="checkbox" x-model="dryRun" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500 dark:border-slate-600 dark:bg-slate-700">
                        <span class="font-medium text-slate-700 dark:text-slate-300">Dry Run</span>
                    </label>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button type="submit"
                        :disabled="polling"
                        :class="dryRun ? 'bg-gradient-to-r from-slate-500 to-slate-600 hover:from-slate-600 hover:to-slate-700' : 'bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700'"
                        class="inline-flex items-center gap-2 rounded-lg px-5 py-2.5 text-sm font-semibold text-white shadow-sm disabled:opacity-50">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    <span x-text="dryRun ? 'Preview Commands' : 'Execute Provisioning'"></span>
                </button>
                <template x-if="polling">
                    <span class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
                        <svg class="h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                        Provisioning in progress...
                    </span>
                </template>
            </div>
        </form>
    </div>

    {# Step-by-step Status Display #}
    <template x-if="result">
        <div class="rounded-2xl border border-slate-200/60 bg-white p-5 shadow-sm dark:border-slate-700/60 dark:bg-slate-800">
            <div class="flex items-center gap-3 mb-4">
                <template x-if="result.success">
                    <svg class="h-6 w-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </template>
                <template x-if="!result.success">
                    <svg class="h-6 w-6 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                </template>
                <h3 class="text-sm font-semibold text-slate-900 dark:text-white" x-text="result.message"></h3>
            </div>
            <div class="space-y-2">
                <template x-for="step in result.steps" :key="step.step">
                    <div class="flex items-center gap-3 rounded-lg px-3 py-2"
                         :class="step.success ? 'bg-emerald-50 dark:bg-emerald-900/10' : 'bg-rose-50 dark:bg-rose-900/10'">
                        <template x-if="step.success">
                            <svg class="h-4 w-4 shrink-0 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                        </template>
                        <template x-if="!step.success">
                            <svg class="h-4 w-4 shrink-0 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </template>
                        <span class="text-xs font-mono text-slate-400 w-6" x-text="'#' + step.step"></span>
                        <span class="text-sm font-medium text-slate-700 dark:text-slate-300 w-48" x-text="step.name"></span>
                        <span class="text-sm text-slate-500 dark:text-slate-400 flex-1" x-text="step.message"></span>
                        <template x-if="step.duration_ms > 0">
                            <span class="text-xs text-slate-400" x-text="step.duration_ms + 'ms'"></span>
                        </template>
                    </div>
                </template>
            </div>

            {# Command Preview (for dry runs) #}
            <template x-if="result.command_preview && result.command_preview.length > 0">
                <div class="mt-4 space-y-3">
                    <h4 class="text-sm font-semibold text-slate-700 dark:text-slate-300">Generated Commands</h4>
                    <template x-for="cs in result.command_preview" :key="cs.step">
                        <div class="rounded-lg border border-slate-200 bg-slate-50 dark:border-slate-700 dark:bg-slate-900">
                            <div class="border-b border-slate-200 px-3 py-2 dark:border-slate-700">
                                <span class="text-xs font-semibold text-slate-700 dark:text-slate-300" x-text="cs.step"></span>
                            </div>
                            <pre class="overflow-x-auto p-3 text-xs text-green-400 font-mono bg-slate-900 rounded-b-lg"><code><template x-for="cmd in cs.commands" :key="cmd"><span x-text="cmd + '\n'"></span></template></code></pre>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </template>
</div>

<script>
function ontProvisioningWidget(ontId) {
    return {
        taskId: null,
        polling: false,
        result: null,
        dryRun: true,

        async submitProvision(formEl) {
            const fd = new FormData(formEl);
            fd.set('dry_run', this.dryRun ? 'true' : 'false');

            try {
                const response = await fetch(`/admin/network/onts/${ontId}/provision`, {
                    method: 'POST',
                    body: fd,
                });
                const data = await response.json();

                if (!data.task_id) {
                    this.result = {
                        success: false,
                        message: data.message || 'Provisioning task could not be started',
                        steps: [],
                    };
                    this.polling = false;
                    return;
                }

                this.taskId = data.task_id;
                this.polling = true;
                this.result = null;
                this.pollStatus();
            } catch (_error) {
                this.result = {
                    success: false,
                    message: 'Failed to start provisioning task',
                    steps: [],
                };
                this.polling = false;
            }
        },

        async pollStatus() {
            if (!this.taskId || !this.polling) {
                return;
            }

            try {
                const response = await fetch(
                    `/admin/network/onts/${ontId}/provision-status?task_id=${this.taskId}`
                );
                const payload = await response.json();

                if (payload.status === 'complete' || payload.status === 'failed') {
                    this.result = payload.result;
                    this.polling = false;
                    return;
                }

                window.setTimeout(() => this.pollStatus(), 3000);
            } catch (_error) {
                this.result = {
                    success: false,
                    message: 'Provisioning status polling failed',
                    steps: [],
                };
                this.polling = false;
            }
        },
    };
}
</script>
