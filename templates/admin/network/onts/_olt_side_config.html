{% if not result.success %}
<div class="rounded-lg border border-rose-200 bg-rose-50 p-4 dark:border-rose-800/50 dark:bg-rose-900/20">
    <p class="text-sm text-rose-700 dark:text-rose-300">{{ result.message }}</p>
</div>
{% else %}
<div class="space-y-4">
    <p class="text-xs text-slate-500 dark:text-slate-400">{{ result.message }}</p>
    {% for section in sections %}
    <div>
        <h4 class="text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400 mb-2">{{ section.label }}</h4>
        <pre class="whitespace-pre-wrap break-words text-xs font-mono text-emerald-800 dark:text-emerald-300 bg-slate-900 dark:bg-slate-950 rounded-lg p-3 overflow-x-auto">{{ section.content }}</pre>
    </div>
    {% endfor %}
</div>
{% endif %}
