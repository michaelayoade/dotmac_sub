<div id="snapshot-list" class="space-y-2">
{% for snap in config_snapshots %}
<div class="flex items-center justify-between rounded-xl border border-slate-200 bg-white p-3 dark:border-slate-700/60 dark:bg-slate-800/80">
    <div class="min-w-0">
        <p class="text-sm font-medium text-slate-900 dark:text-white">{{ snap.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
        <p class="text-xs text-slate-500 dark:text-slate-400 truncate">{{ snap.source }}{% if snap.label %} &middot; {{ snap.label }}{% endif %}</p>
    </div>
    <div class="flex items-center gap-2 shrink-0 ml-3">
        <button @click="$dispatch('open-modal', { name: 'so-snapshot' })"
                hx-get="/admin/network/onts/{{ ont_id }}/config-snapshots/{{ snap.id }}"
                hx-target="#so-snapshot-body"
                hx-swap="innerHTML"
                class="text-xs font-medium text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300">
            View
        </button>
        <button hx-delete="/admin/network/onts/{{ ont_id }}/config-snapshots/{{ snap.id }}"
                hx-target="#snapshot-list"
                hx-swap="innerHTML"
                hx-confirm="Delete this config snapshot?"
                class="text-xs font-medium text-rose-600 hover:text-rose-800 dark:text-rose-400 dark:hover:text-rose-300">
            Delete
        </button>
    </div>
</div>
{% endfor %}
{% if not config_snapshots %}
<p class="py-4 text-center text-sm text-slate-500 dark:text-slate-400">No snapshots yet. Save a config to create the first snapshot.</p>
{% endif %}
</div>
