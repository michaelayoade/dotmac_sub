<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm"
     role="dialog"
     aria-modal="true"
     aria-labelledby="location-details-modal-title"
     x-data="{ open: true }"
     x-show="open" x-transition>
    <div class="w-full max-w-2xl rounded-2xl bg-white p-6 shadow-2xl dark:bg-slate-800"
         @click.outside="open = false; $nextTick(() => document.getElementById('modal-container').replaceChildren())">
        <div class="mb-4 flex items-center justify-between">
            <div>
                <h3 id="location-details-modal-title" class="text-lg font-bold text-slate-900 dark:text-white">Update Location Details</h3>
                <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Update network assignment, location identification, and GPS coordinates for this ONT.</p>
            </div>
            <button @click="open = false; $nextTick(() => document.getElementById('modal-container').replaceChildren())"
                    aria-label="Close modal"
                    class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <form method="POST"
              action="/admin/network/onts/{{ ont.id }}/location-details"
              hx-post="/admin/network/onts/{{ ont.id }}/location-details"
              hx-swap="outerHTML">
            {% include "components/forms/csrf_input.html" %}

            {% if error %}
            <div class="mb-4 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700 dark:border-rose-800/50 dark:bg-rose-900/20 dark:text-rose-300">
                {{ error }}
            </div>
            {% endif %}

            <div class="space-y-6">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Network Assignment</p>
                    <div class="mt-3 grid grid-cols-1 gap-4 sm:grid-cols-2">
                        <div>
                            <label for="location-zone-id" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Zone</label>
                            <select id="location-zone-id"
                                    name="zone_id"
                                    class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                                <option value="">None</option>
                                {% for zone in zones %}
                                <option value="{{ zone.id }}" {% if form.zone_id == (zone.id | string) %}selected{% endif %}>{{ zone.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div>
                            <label for="location-splitter-id" class="block text-sm font-medium text-slate-700 dark:text-slate-300">ODB (Splitter)</label>
                            <select id="location-splitter-id"
                                    name="splitter_id"
                                    class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                                <option value="">None</option>
                                {% for splitter in splitters %}
                                <option value="{{ splitter.id }}" {% if form.splitter_id == (splitter.id | string) %}selected{% endif %}>
                                    {{ splitter.name }}{% if splitter.splitter_ratio %} ({{ splitter.splitter_ratio }}){% endif %}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="sm:col-span-2">
                            <label for="location-splitter-port" class="block text-sm font-medium text-slate-700 dark:text-slate-300">ODB Port</label>
                            <input id="location-splitter-port"
                                   name="splitter_port_number"
                                   type="number"
                                   min="1"
                                   step="1"
                                   value="{{ form.splitter_port_number }}"
                                   class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white"
                                   placeholder="e.g. 8">
                        </div>
                    </div>
                </div>

                <div>
                    <p class="text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Identification</p>
                    <div class="mt-3 grid grid-cols-1 gap-4 sm:grid-cols-2">
                        <div class="sm:col-span-2">
                            <label for="location-name" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Name</label>
                            <input id="location-name"
                                   name="name"
                                   type="text"
                                   value="{{ form.name }}"
                                   class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                        </div>
                        <div class="sm:col-span-2">
                            <label for="location-address" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Address or comment</label>
                            <textarea id="location-address"
                                      name="address_or_comment"
                                      rows="3"
                                      class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">{{ form.address_or_comment }}</textarea>
                        </div>
                        <div class="sm:col-span-2">
                            <label for="location-contact" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Contact</label>
                            <input id="location-contact"
                                   name="contact"
                                   type="text"
                                   value="{{ form.contact }}"
                                   class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white">
                        </div>
                    </div>
                </div>

                <div>
                    <p class="text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">GPS Location</p>
                    <div class="mt-3 grid grid-cols-1 gap-4 sm:grid-cols-2">
                        <div>
                            <label for="location-latitude" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Latitude</label>
                            <input id="location-latitude"
                                   name="gps_latitude"
                                   type="text"
                                   value="{{ form.gps_latitude }}"
                                   class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white"
                                   placeholder="e.g. 9.072264">
                        </div>
                        <div>
                            <label for="location-longitude" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Longitude</label>
                            <input id="location-longitude"
                                   name="gps_longitude"
                                   type="text"
                                   value="{{ form.gps_longitude }}"
                                   class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:border-slate-600 dark:bg-slate-700 dark:text-white"
                                   placeholder="e.g. 7.491302">
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-6 flex justify-end gap-3">
                <button type="button"
                        @click="open = false; $nextTick(() => document.getElementById('modal-container').replaceChildren())"
                        class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-700">
                    Close
                </button>
                <button type="submit"
                        class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-blue-700">
                    Update
                </button>
            </div>
        </form>
    </div>
</div>
