<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm"
     role="dialog"
     aria-modal="true"
     aria-labelledby="device-info-modal-title"
     x-data="{ open: true }"
     x-show="open" x-transition>
    <div class="w-full max-w-2xl rounded-2xl bg-white p-6 shadow-2xl dark:bg-slate-800"
         @click.outside="open = false; $nextTick(() => document.getElementById('modal-container').replaceChildren())">
        <div class="mb-4 flex items-center justify-between">
            <h3 id="device-info-modal-title" class="text-lg font-bold text-slate-900 dark:text-white">Update Device Information</h3>
            <button @click="open = false; $nextTick(() => document.getElementById('modal-container').replaceChildren())"
                    aria-label="Close modal"
                    class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <form method="POST"
              action="/admin/network/onts/{{ ont.id }}/device-info"
              hx-post="/admin/network/onts/{{ ont.id }}/device-info"
              hx-swap="outerHTML">
            {% include "components/forms/csrf_input.html" %}

            {% if error %}
            <div class="mb-4 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700 dark:border-rose-800/50 dark:bg-rose-900/20 dark:text-rose-300">
                {{ error }}
            </div>
            {% endif %}

            <p class="mb-4 text-sm text-slate-500 dark:text-slate-400">Device information is populated from discovery and ACS data.</p>

            <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                <div>
                    <label for="device-info-model" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Model</label>
                    <input id="device-info-model" type="text" readonly value="{{ ont.model or '—' }}"
                           class="mt-1 block w-full rounded-lg border border-slate-300 bg-slate-100 px-3 py-2 text-sm text-slate-700 shadow-sm dark:border-slate-600 dark:bg-slate-900 dark:text-slate-300">
                </div>
                <div>
                    <label for="device-info-firmware" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Firmware</label>
                    <input id="device-info-firmware" type="text" readonly value="{{ ont.firmware_version or '—' }}"
                           class="mt-1 block w-full rounded-lg border border-slate-300 bg-slate-100 px-3 py-2 text-sm text-slate-700 shadow-sm dark:border-slate-600 dark:bg-slate-900 dark:text-slate-300">
                </div>
                <div>
                    <label for="device-info-vendor" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Vendor</label>
                    <input id="device-info-vendor" type="text" readonly value="{{ ont.vendor or '—' }}"
                           class="mt-1 block w-full rounded-lg border border-slate-300 bg-slate-100 px-3 py-2 text-sm text-slate-700 shadow-sm dark:border-slate-600 dark:bg-slate-900 dark:text-slate-300">
                </div>
                <div>
                    <label for="device-info-serial" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Serial Number</label>
                    <input id="device-info-serial" type="text" readonly value="{{ ont.serial_number or '' }}"
                           class="mt-1 block w-full rounded-lg border border-slate-300 bg-slate-100 px-3 py-2 text-sm font-mono text-slate-700 shadow-sm dark:border-slate-600 dark:bg-slate-900 dark:text-slate-300">
                    <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">Locked after creation.</p>
                </div>
                <div class="sm:col-span-2">
                    <label for="device-info-onu-type" class="block text-sm font-medium text-slate-700 dark:text-slate-300">ONU Type</label>
                    <input id="device-info-onu-type" type="text" readonly value="{{ ont.onu_type.name if ont.onu_type else '—' }}"
                           class="mt-1 block w-full rounded-lg border border-slate-300 bg-slate-100 px-3 py-2 text-sm text-slate-700 shadow-sm dark:border-slate-600 dark:bg-slate-900 dark:text-slate-300">
                </div>
            </div>

            <div class="mt-6 flex justify-end gap-3">
                <button type="button"
                        @click="open = false; $nextTick(() => document.getElementById('modal-container').replaceChildren())"
                        class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-700">
                    Close
                </button>
            </div>
        </form>
    </div>
</div>
