<div class="contents">
    <div>
        <label for="subscription_id" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Subscription</label>
        <select name="subscription_id" id="subscription_id" class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
            <option value="">None</option>
            {% for sub in subscriptions %}
            <option value="{{ sub.id }}" {% if cpe.subscription_id|string == sub.id|string %}selected{% endif %}>
                {{ sub.id }}{% if sub.status %} - {{ sub.status.value | title }}{% endif %}
            </option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label for="service_address_id" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Service Address</label>
        <select name="service_address_id" id="service_address_id" class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-700 dark:text-white">
            <option value="">None</option>
            {% for addr in addresses %}
            <option value="{{ addr.id }}" {% if cpe.service_address_id|string == addr.id|string %}selected{% endif %}>
                {{ addr.address_line1 }}{% if addr.city %}, {{ addr.city }}{% endif %}
            </option>
            {% endfor %}
        </select>
    </div>
</div>
