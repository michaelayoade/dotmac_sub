{% extends "base.html" %}

{% block title %}Page Not Found - 404{% endblock %}

{% block body %}
<div class="min-h-screen bg-slate-50 dark:bg-slate-900 flex flex-col items-center justify-center px-4 relative overflow-hidden">
    <!-- Subtle background decoration -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
        <div class="absolute top-1/4 -left-24 w-96 h-96 rounded-full bg-primary-100/40 dark:bg-primary-900/10 blur-3xl"></div>
        <div class="absolute bottom-1/4 -right-24 w-80 h-80 rounded-full bg-amber-100/30 dark:bg-amber-900/10 blur-3xl"></div>
    </div>

    <div class="relative max-w-lg w-full text-center">
        <!-- Illustrated icon -->
        <div class="mx-auto flex h-28 w-28 items-center justify-center rounded-3xl bg-gradient-to-br from-primary-50 to-primary-100 dark:from-primary-900/30 dark:to-primary-800/20 shadow-sm border border-primary-200/50 dark:border-primary-700/30 mb-8">
            <svg class="h-14 w-14 text-primary-500 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
            </svg>
        </div>

        <p class="text-6xl font-black text-primary-600/80 dark:text-primary-400/60 tracking-tight" style="font-family: var(--font-display);">404</p>
        <h1 class="mt-3 text-2xl font-bold text-slate-900 dark:text-white" style="font-family: var(--font-display);">Page not found</h1>
        <p class="mt-3 text-base text-slate-500 dark:text-slate-400 leading-relaxed max-w-sm mx-auto">
            {{ message if message else "The page you're looking for doesn't exist or may have been moved." }}
        </p>
        {% if request_id %}
        <p class="mt-4 text-xs text-slate-400 dark:text-slate-500 font-mono">Ref: {{ request_id }}</p>
        {% endif %}
        <div class="mt-8 flex flex-col sm:flex-row items-center justify-center gap-3">
            <a href="/" class="inline-flex items-center gap-2 rounded-xl bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-slate-800 dark:bg-white dark:text-slate-900 dark:hover:bg-slate-100 transition-colors">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Go home
            </a>
            <button onclick="history.back()" class="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-5 py-2.5 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700 transition-colors">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Go back
            </button>
        </div>
    </div>
</div>
{% endblock %}
