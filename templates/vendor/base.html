{% extends "base.html" %}
{% block body %}
<div class="min-h-screen bg-slate-100 dark:bg-slate-950">
  <header class="border-b border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6">
      <a href="/vendor" class="flex items-center gap-3 text-slate-950 dark:text-white">
        <span class="flex h-10 w-10 items-center justify-center rounded-md bg-teal-600 text-lg font-bold text-white">D</span>
        <span><strong class="block text-base">Vendor operations</strong><span class="block text-xs text-slate-500">{{ vendor.name }}</span></span>
      </a>
      <div class="flex items-center gap-2">
        <a href="/vendor" class="rounded-md px-3 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">Projects</a>
        <form method="post" action="/auth/logout"><input type="hidden" name="_csrf_token" value="{{ request.state.csrf_token }}"><button class="rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold dark:border-slate-700">Sign out</button></form>
      </div>
    </div>
  </header>
  <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6">{% block vendor_content %}{% endblock %}</main>
</div>
{% endblock %}
