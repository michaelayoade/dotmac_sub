{% from "customer/billing/_payment_macros.html" import bank_icon, card_expiry, card_icon, card_label, default_badge %}

{% if payment_choice_type == "provider" %}
<label
    :class="selectedPaymentChoice === 'provider:{{ option.provider_type }}' ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/20' : 'border-stone-200 bg-white hover:border-stone-300 dark:border-stone-700 dark:bg-stone-800 dark:hover:border-stone-600'"
    class="flex cursor-pointer items-center gap-4 rounded-2xl border p-4 transition-colors">
    <input
        type="radio"
        name="payment_choice"
        data-form-consumer="client"
        value="provider:{{ option.provider_type }}"
        x-model="selectedPaymentChoice"
        class="h-4 w-4 border-stone-300 text-emerald-600 focus:ring-emerald-500">
    <span class="flex h-11 w-11 flex-shrink-0 items-center justify-center rounded-xl bg-stone-100 dark:bg-stone-700">
        {% if option.provider_type == "direct_bank_transfer" %}{{ bank_icon() }}{% else %}{{ card_icon() }}{% endif %}
    </span>
    <span class="min-w-0 flex-1">
        <span class="block text-sm font-semibold text-stone-900 dark:text-white">{{ option.label }}</span>
        <span class="mt-0.5 block text-sm text-stone-500 dark:text-stone-400">
            {% if option.provider_type == "direct_bank_transfer" %}Transfer to our bank account and upload your receipt{% else %}Secure online checkout{% endif %}
        </span>
    </span>
</label>
{% elif payment_choice_type == "card" %}
<label
    :class="selectedPaymentChoice === 'card:{{ method.id }}' ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/20' : 'border-stone-200 bg-white hover:border-stone-300 dark:border-stone-700 dark:bg-stone-800 dark:hover:border-stone-600'"
    class="flex cursor-pointer items-center gap-4 rounded-2xl border p-4 transition-colors">
    <input
        type="radio"
        name="payment_choice"
        data-form-consumer="client"
        value="card:{{ method.id }}"
        x-model="selectedPaymentChoice"
        class="h-4 w-4 border-stone-300 text-emerald-600 focus:ring-emerald-500">
    <span class="flex h-11 w-11 flex-shrink-0 items-center justify-center rounded-xl bg-stone-100 dark:bg-stone-700">
        {{ card_icon() }}
    </span>
    <span class="min-w-0 flex-1">
        <span class="block truncate text-sm font-semibold text-stone-900 dark:text-white">
            {{ card_label(method) }}
        </span>
        <span class="mt-0.5 block text-sm text-stone-500 dark:text-stone-400">
            {{ card_expiry(method, "Saved payment method") }}
        </span>
    </span>
    {% if method.is_default %}{{ default_badge() }}{% endif %}
</label>
{% endif %}
