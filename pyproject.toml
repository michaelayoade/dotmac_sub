[project]
name = "dotmac_sm"
version = "0.1.0"
description = "Subscriber management API and web UI"
authors = [{name = "DotMac", email = "engineering@dotmac.local"}]
requires-python = ">=3.11,<3.13"
dependencies = [
    "fastapi==0.111.0",
    "uvicorn[standard]==0.30.1",
    "sqlalchemy==2.0.31",
    "psycopg[binary]==3.1.19",
    "alembic==1.13.2",
    "pydantic==2.7.4",
    "python-dotenv==1.0.1",
    "jinja2==3.1.4",
    "redis==5.0.4",
    "celery[redis]==5.4.0",
    "prometheus-client==0.20.0",
    "httpx==0.27.0",
    "opentelemetry-api==1.26.0",
    "opentelemetry-sdk==1.26.0",
    "opentelemetry-exporter-otlp==1.26.0",
    "opentelemetry-instrumentation-fastapi==0.47b0",
    "opentelemetry-instrumentation-sqlalchemy==0.47b0",
    "opentelemetry-instrumentation-celery==0.47b0",
    "python-jose[cryptography]==3.3.0",
    "passlib[bcrypt]==1.7.4",
    "pyotp==2.9.0",
    "cryptography==42.0.8",
    "paramiko==3.4.1",
    "ncclient==0.6.15",
    "routeros-api==0.17.0",
    "pyrad==2.4",
    "geoalchemy2==0.14.7",
    "shapely==2.0.4",
    "weasyprint==61.2",
    "aiosmtpd==1.4.6",
    "sse-starlette>=1.6.0",
    "boto3>=1.40.0",
    "pymysql>=1.1.2",
    "sshtunnel>=0.4.0",
    "textfsm>=1.1.3",
    "python-logging-loki>=0.3.1",
    "sentry-sdk[celery,fastapi,sqlalchemy] (>=2.57.0,<3.0.0)",
]

[project.optional-dependencies]
dev = [
    "pytest==8.2.2",
    "pytest-cov==5.0.0",
    "playwright==1.46.0",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.15.0",
    "mypy>=1.11.0",
    "bandit[toml]>=1.9.0",
    "pre-commit>=3.7.0",
    "import-linter>=2.0",
]

[tool.poetry]
package-mode = false

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "S",      # flake8-bandit (security)
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
    "S101",   # use of assert (OK in tests)
    "B007",   # loop control variable not used
    "B017",   # assert raises Exception in tests/legacy code
    "B904",   # raise without explicit cause in except
    "B905",   # zip strict parameter not explicitly set
    "C401",   # unnecessary generator for set
    "C408",   # unnecessary collection() call
    "C416",   # unnecessary comprehension
    "E402",   # import not at top of file
    "E712",   # boolean comparison against True/False
    "E741",   # ambiguous variable names in legacy/tests
    "F841",   # assigned but unused local variable
    "S105",   # possible hardcoded password string
    "S110",   # try/except/pass
    "S112",   # try/except/continue
    "S507",   # paramiko host key policy warning
    "S603",   # subprocess call
    "S607",   # partial executable path
    "UP042",  # prefer StrEnum
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "S105", "S106"]  # Allow assert and hardcoded passwords in tests
"scripts/**" = ["S101", "S105", "S106"]
"scripts/migration/**" = ["S608"]
"alembic/**" = ["E402"]  # Allow imports not at top of file
"alembic/versions_archive/**" = ["S104", "S608"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
warn_return_any = false
warn_unused_ignores = false
disallow_untyped_defs = false
ignore_missing_imports = true
mypy_path = "stubs"

