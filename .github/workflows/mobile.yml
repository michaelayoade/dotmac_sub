name: Mobile CI

# Scoped to the Flutter app so backend-only PRs don't pay for a Flutter run.
on:
  push:
    branches: [main, develop]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Flutter analyze & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test test_live

      - name: Analyze
        run: flutter analyze

      # Unit tests only (test/). The live integration test under test_live/ needs
      # a running backend + credentials, so it is not run in CI.
      - name: Unit tests
        run: flutter test

  # iOS can only be compiled on macOS — this proves the committed ios/ project
  # builds. No code signing (CI has no provisioning profile).
  ios-build:
    name: iOS build (no codesign)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign
