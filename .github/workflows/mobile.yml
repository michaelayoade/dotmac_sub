name: Mobile CI

# Runs on every PR so the `Mobile CI` gate job always reports a status (a
# required check that never reports would deadlock a PR). The expensive Flutter
# and iOS jobs stay scoped to mobile changes via the `changes` filter below, so
# backend-only PRs still don't pay for a Flutter/iOS run.
on:
  push:
    branches: [main, develop, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect mobile changes
    runs-on: ubuntu-latest
    outputs:
      mobile: ${{ steps.filter.outputs.mobile }}
      field_mobile: ${{ steps.filter.outputs.field_mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mobile:
              - 'mobile/**'
              - '.github/workflows/mobile.yml'
            field_mobile:
              - 'field_mobile/**'
              - '.github/workflows/mobile.yml'

  flutter:
    name: Flutter analyze & test
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Format-check only the Dart files this PR/push changed. A whole-tree check
      # couples every mobile PR to pre-existing drift AND to the automated
      # version-bump commits (which touch main.dart/env.dart), so it could never
      # pass while main churns. Scoping to the diff enforces format on what you
      # touch without that coupling.
      - name: Verify formatting (changed files)
        run: |
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          files=$(cd .. && git diff --name-only "$base"...HEAD -- 'mobile/**/*.dart' 2>/dev/null | sed 's|^mobile/||')
          if [ -z "$files" ]; then echo "No changed Dart files to format-check."; exit 0; fi
          echo "Format-checking:"; echo "$files"
          echo "$files" | xargs dart format --output=none --set-exit-if-changed

      - name: Analyze
        run: flutter analyze

      # Unit tests only (test/). The live integration test under test_live/ needs
      # a running backend + credentials, so it is not run in CI.
      - name: Unit tests
        run: flutter test

  field-flutter:
    name: Field Flutter analyze & test
    needs: changes
    if: needs.changes.outputs.field_mobile == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: field_mobile
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting (changed files)
        run: |
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          files=$(cd .. && git diff --name-only "$base"...HEAD -- 'field_mobile/**/*.dart' 2>/dev/null | sed 's|^field_mobile/||')
          if [ -z "$files" ]; then echo "No changed Dart files to format-check."; exit 0; fi
          echo "Format-checking:"; echo "$files"
          echo "$files" | xargs dart format --output=none --set-exit-if-changed

      - name: Analyze
        run: flutter analyze

      - name: Unit tests
        run: flutter test

  # iOS can only be compiled on macOS — this proves the committed ios/ project
  # builds. No code signing (CI has no provisioning profile). Advisory: it is not
  # part of the required `Mobile CI` gate (macOS runs are slow/flaky for a
  # codesign-less smoke build).
  ios-build:
    name: iOS build (no codesign)
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign

  # Always-reporting gate so it can be a required status check without blocking
  # backend-only PRs: it passes when the Flutter job succeeded OR was skipped
  # (no mobile changes), and fails only when Flutter actually failed. iOS is
  # intentionally excluded (advisory).
  gate:
    name: Mobile CI
    needs: [flutter, field-flutter]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require Flutter checks (or skip on backend-only PRs)
        run: |
          result='${{ needs.flutter.result }}'
          field_result='${{ needs.field-flutter.result }}'
          echo "flutter job result: $result"
          echo "field flutter job result: $field_result"
          if { [ "$result" = "success" ] || [ "$result" = "skipped" ]; } && { [ "$field_result" = "success" ] || [ "$field_result" = "skipped" ]; }; then
            echo "Mobile CI gate passed."
          else
            echo "Mobile CI gate failed (flutter=$result, field_flutter=$field_result)."
            exit 1
          fi
