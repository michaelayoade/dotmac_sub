name: Version Bump PR

on:
  pull_request:
    types: [closed]
    branches: [main, dev]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: version-bump-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  bump:
    name: Open version bump PR
    if: >-
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.head.ref, 'automation/version-bump-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Resolve version bump
        id: impact
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          labels = {
              label["name"]
              for label in json.loads(os.environ["LABELS_JSON"])
              if isinstance(label, dict) and isinstance(label.get("name"), str)
          }
          impacts = sorted(labels & {"version:major", "version:minor", "version:patch", "version:none"})

          if len(impacts) > 1:
              raise SystemExit(f"Expected one version impact label, found: {', '.join(impacts)}")

          impact = impacts[0] if impacts else "version:none"
          bump = impact.split(":", 1)[1]
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"impact={impact}\n")
              output.write(f"bump={bump}\n")
          PY

      - name: Apply version bump
        if: steps.impact.outputs.bump != 'none'
        env:
          BUMP: ${{ steps.impact.outputs.bump }}
          BUMP_BRANCH: automation/version-bump-${{ github.event.pull_request.base.ref }}
        run: |
          # Seed from the rolling bump branch (if it has a newer pending
          # version) so an unmerged bump isn't lost or downgraded when the
          # branch is recreated from the base ref.
          PENDING=""
          if git fetch origin "$BUMP_BRANCH" 2>/dev/null; then
            PENDING="$(git show FETCH_HEAD:VERSION 2>/dev/null | tr -d '[:space:]')" || PENDING=""
          fi
          python3 - "$BUMP" "$PENDING" <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          bump, pending = sys.argv[1], sys.argv[2]
          version_file = Path("VERSION")
          current = version_file.read_text(encoding="utf-8").strip()

          def parts(version: str) -> tuple[int, ...]:
              return tuple(int(piece) for piece in version.split("."))

          try:
              if pending and parts(pending) > parts(current):
                  version_file.write_text(pending + "\n", encoding="utf-8")
          except ValueError:
              pass

          subprocess.run([sys.executable, "scripts/bump_version.py", bump], check=True)
          PY

      - name: Read bumped version
        if: steps.impact.outputs.bump != 'none'
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # GitHub does not trigger workflow runs for events raised with GITHUB_TOKEN --
      # a deliberate guard against workflows recursing into themselves. So when we
      # fall back to it, the bump PR opens with *zero* checks, the required contexts
      # on the base branch never report, and the PR is unmergeable except by an admin
      # bypass. That failure is silent, which is how main's VERSION drifted far behind
      # the bump PR's. Surface it here, and say so in the PR body, instead.
      # "Present" must mean "works", not "non-empty". A secret set to a
      # placeholder (or to an expired token) is worse than an unset one: the
      # naive -n check passes, the warning below never fires, and the PR-creation
      # step then fails authentication with no explanation. So actually exercise
      # the token, and fall back to GITHUB_TOKEN if it does not authenticate.
      - name: Check PR-creation token
        if: steps.impact.outputs.bump != 'none'
        id: token
        env:
          VERSION_BUMP_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
        run: |
          note_broken() {
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=VERSION_BUMP_TOKEN $1::The bump PR falls back to GITHUB_TOKEN, so CI will not run on it (GitHub does not trigger workflows for GITHUB_TOKEN events) and its required checks can never report. It will sit unmergeable until VERSION_BUMP_TOKEN is a PAT or GitHub App token with contents:write + pull-requests:write."
          }

          if [ -z "$VERSION_BUMP_TOKEN" ]; then
            note_broken "is not set"
          elif ! curl -sfL -o /dev/null \
              -H "Authorization: Bearer $VERSION_BUMP_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/user; then
            note_broken "is set but does not authenticate"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create version bump PR
        if: steps.impact.outputs.bump != 'none'
        uses: peter-evans/create-pull-request@v6
        with:
          # Select on the *validated* verdict, not on `|| secrets.GITHUB_TOKEN`.
          # A junk VERSION_BUMP_TOKEN is non-empty, so the `||` fallback would
          # happily pass it through and fail auth here instead of degrading.
          token: ${{ steps.token.outputs.present == 'true' && secrets.VERSION_BUMP_TOKEN || secrets.GITHUB_TOKEN }}
          base: ${{ github.event.pull_request.base.ref }}
          branch: automation/version-bump-${{ github.event.pull_request.base.ref }}
          delete-branch: true
          commit-message: "chore: bump version to ${{ steps.version.outputs.version }}"
          title: "chore: bump version to ${{ steps.version.outputs.version }}"
          body: |
            Rolling version bump PR for `${{ github.event.pull_request.base.ref }}` — updated in place as source PRs merge, carrying any pending bump forward.

            Version impact: none because this PR only applies generated version bumps.
            ${{ steps.token.outputs.present == 'false' && '
            > [!WARNING]
            > **This PR cannot merge as-is, and no CI will run on it.**
            >
            > It was created with `GITHUB_TOKEN`, and GitHub does not trigger workflow
            > runs for events raised with that token (a recursion guard). So the required
            > status checks on the base branch will never report, and the PR stays
            > `BLOCKED` — merging it needs an admin bypass every time.
            >
            > Fix: set a repo secret `VERSION_BUMP_TOKEN` to a PAT or GitHub App token with
            > `contents: write` + `pull-requests: write`. This workflow already prefers it
            > over `GITHUB_TOKEN`; once set, the next bump PR runs CI and merges on green.
            ' || '' }}
            Latest source PR: #${{ github.event.pull_request.number }}
            Latest source impact: ${{ steps.impact.outputs.impact }}
            New version: ${{ steps.version.outputs.version }}
          labels: "version:none"
