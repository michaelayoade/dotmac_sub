      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/dotmac_sub
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      VICTORIAMETRICS_URL: http://victoriametrics:8428
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: dotmac-sub-dev-token
      APP_RELEASE: ${APP_RELEASE:-}
      GIT_SHA: ${GIT_SHA:-}
    env_file:
    - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      victoriametrics:
        condition: service_started
