services:
  app:
    build: .
    container_name: dotmac_sub_app
    restart: unless-stopped
    ports:
    - 127.0.0.1:8001:8001
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/dotmac_sub
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SESSION_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      WIREGUARD_USE_NSENTER: '1'
      VPN_BLOCKED_LAN_SUBNETS: 172.20.255.0/24
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      SPLYNX_MYSQL_PASS: ${SPLYNX_MYSQL_PASS:-}
      SPLYNX_MYSQL_PASSWORD: ${SPLYNX_MYSQL_PASSWORD:-}
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: dotmac-sub-dev-token
      # Monitoring
      SERVER_NAME: ${SERVER_NAME:-dotmac-sub-prod}
      GLITCHTIP_DSN: ${GLITCHTIP_DSN:-}
    env_file:
    - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      openbao:
        condition: service_healthy
    cap_add:
    - NET_ADMIN
    privileged: true
    pid: host
    sysctls:
      net.ipv4.ip_forward: '1'
    volumes:
    - /etc/wireguard:/etc/wireguard
    - ./app:/app/app
    - ./templates:/app/templates
    - ./static:/app/static
    - ./alembic:/app/alembic
    - ./uploads:/app/uploads
    command:
    - /bin/sh
    - -c
    - alembic upgrade heads && uvicorn app.main:app --host 0.0.0.0 --port 8001 --no-access-log
  celery-worker:
    build: .
    container_name: dotmac_sub_celery_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/dotmac_sub
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      SPLYNX_MYSQL_PASS: ${SPLYNX_MYSQL_PASS:-}
      SPLYNX_MYSQL_PASSWORD: ${SPLYNX_MYSQL_PASSWORD:-}
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: dotmac-sub-dev-token
    env_file:
    - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      openbao:
        condition: service_healthy
    volumes:
    - ./app:/app/app
    - ./uploads:/app/uploads
    command:
    - celery
    - -A
    - app.celery_app.celery_app
    - worker
    - --loglevel=info
    - -Q
    - celery
  celery-worker-tr069:
    build: .
    container_name: dotmac_sub_celery_worker_tr069
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/dotmac_sub
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      SPLYNX_MYSQL_PASS: ${SPLYNX_MYSQL_PASS:-}
      SPLYNX_MYSQL_PASSWORD: ${SPLYNX_MYSQL_PASSWORD:-}
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: dotmac-sub-dev-token
    env_file:
    - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      openbao:
        condition: service_healthy
    volumes:
    - ./app:/app/app
    - ./uploads:/app/uploads
    command:
    - celery
    - -A
    - app.celery_app.celery_app
    - worker
    - --loglevel=info
    - -Q
    - tr069
  celery-beat:
    build: .
    container_name: dotmac_sub_celery_beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/dotmac_sub
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      SPLYNX_MYSQL_PASS: ${SPLYNX_MYSQL_PASS:-}
      SPLYNX_MYSQL_PASSWORD: ${SPLYNX_MYSQL_PASSWORD:-}
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: dotmac-sub-dev-token
    env_file:
    - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      openbao:
        condition: service_healthy
    volumes:
    - ./app:/app/app
    command:
    - celery
    - -A
    - app.celery_app.celery_app
    - beat
    - --loglevel=info
  db:
    image: postgis/postgis:16-3.4
    container_name: dotmac_sub_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: dotmac_sub
    ports:
    - 5434:5432
    volumes:
    - dotmac_sub_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    container_name: dotmac_sub_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
    - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: dotmac_sub_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
    - 9000:9000
    - 9001:9001
    volumes:
    - minio_data:/data
  nominatim:
    image: mediagis/nominatim:4.4
    container_name: dotmac_sub_nominatim
    restart: unless-stopped
    environment:
      PBF_URL: https://download.geofabrik.de/africa/nigeria-latest.osm.pbf
      IMPORT_STYLE: extratags
    ports:
    - 8088:8080
    volumes:
    - nominatim_data:/var/lib/postgresql/14/main
    - nominatim_flatnode:/var/lib/nominatim/flatnode
  freeradius:
    image: freeradius/freeradius-server:3.2.3
    container_name: dotmac_sub_freeradius
    restart: unless-stopped
    ports:
    - 1812:1812/udp
    - 1813:1813/udp
    volumes:
    - ./config/freeradius/mods-enabled/sql:/etc/raddb/mods-enabled/sql
    - ./config/freeradius/sites-enabled/default:/etc/raddb/sites-enabled/default
    - ./config/freeradius/dictionary.mikrotik:/etc/raddb/dictionary.mikrotik
    - ./config/freeradius/dictionary:/etc/raddb/dictionary
    depends_on:
    - radius-db
    environment:
    - RADIUS_DB_HOST=radius-db
    - RADIUS_DB_NAME=radius
    - RADIUS_DB_USER=radius
    - RADIUS_DB_PASS=${RADIUS_DB_PASS}
  radius-db:
    image: postgres:16
    container_name: dotmac_sub_radius_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: radius
      POSTGRES_PASSWORD: ${RADIUS_DB_PASS}
      POSTGRES_DB: radius
    ports:
    - 5437:5432
    volumes:
    - radius_db_data:/var/lib/postgresql/data
    - ./config/freeradius/schema.sql:/docker-entrypoint-initdb.d/schema.sql
  genieacs:
    build:
      context: .
      dockerfile: docker/genieacs/Dockerfile
    image: dotmac_sub-genieacs:1.2.13
    container_name: dotmac_sub_genieacs
    restart: unless-stopped
    ports:
    - 7547:7547
    - 7557:7557
    - 7567:7567
    - 3000:3000
    depends_on:
    - genieacs-mongodb
    environment:
    - GENIEACS_MONGODB_CONNECTION_URL=mongodb://genieacs:${GENIEACS_MONGODB_PASSWORD}@genieacs-mongodb/genieacs?authSource=admin
    - GENIEACS_UI_JWT_SECRET=${GENIEACS_UI_JWT_SECRET}
    - GENIEACS_CWMP_AUTHENTICATION=${GENIEACS_CWMP_USER}:${GENIEACS_CWMP_PASS}
    - NODE_OPTIONS=--enable-source-maps
    - DOTMAC_WEBHOOK_URL=http://app:8001/api/v1/tr069/inform
    volumes:
    - ./docker/genieacs/ext:/opt/genieacs/ext:ro
  genieacs-mongodb:
    image: mongo:4.4
    container_name: dotmac_sub_genieacs_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: genieacs
      MONGO_INITDB_ROOT_PASSWORD: ${GENIEACS_MONGODB_PASSWORD}
    ports:
    - 27017:27017
    volumes:
    - genieacs_mongodb_data:/data/db
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.96.0
    container_name: dotmac_sub_victoriametrics
    restart: unless-stopped
    ports:
    - 8428:8428
    volumes:
    - victoriametrics_data:/victoria-metrics-data
    command:
    - -retentionPeriod=365d
    - -search.maxUniqueTimeseries=1000000

  # Logging Stack - Loki, Promtail, Grafana
  loki:
    image: grafana/loki:3.0.0
    container_name: dotmac_sub_loki
    restart: unless-stopped
    ports:
    - 3100:3100
    volumes:
    - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.0.0
    container_name: dotmac_sub_promtail
    restart: unless-stopped
    volumes:
    - ./config/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.3.1
    container_name: dotmac_sub_grafana
    restart: unless-stopped
    ports:
    - 3001:3000
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      # Database env vars for datasource provisioning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
    - grafana_data:/var/lib/grafana
    - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
      victoriametrics:
        condition: service_started

  bandwidth-poller:
    build: .
    container_name: dotmac_sub_bandwidth_poller
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/dotmac_sub
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      VICTORIAMETRICS_URL: http://victoriametrics:8428
      BANDWIDTH_POLLING_ENABLED: 'true'
      BANDWIDTH_POLL_INTERVAL_MS: '1000'
      BANDWIDTH_HOT_RETENTION_HOURS: '24'
      BANDWIDTH_REDIS_STREAM: bandwidth:samples
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: dotmac-sub-dev-token
    env_file:
    - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      victoriametrics:
        condition: service_started
      minio:
        condition: service_started
      openbao:
        condition: service_healthy
    volumes:
    - ./app:/app/app
    command:
    - python
    - -m
    - app.poller
  # Local SMTP sink disabled.
  # mailhog:
  #   image: mailhog/mailhog:latest
  #   container_name: dotmac_sub_mailhog
  #   restart: unless-stopped
  #   ports:
  #   - 1025:1025
  #   - 8025:8025
  openbao:
    image: quay.io/openbao/openbao:latest
    container_name: dotmac_sub_openbao
    restart: unless-stopped
    ports:
    - 8200:8200
    environment:
      BAO_DEV_ROOT_TOKEN_ID: dotmac-sub-dev-token
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
    - IPC_LOCK
    command: server -dev
    volumes:
    - openbao_data:/openbao/data
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 3
volumes:
  openbao_data: null
  dotmac_sub_db_data: null
  nominatim_data: null
  nominatim_flatnode: null
  radius_db_data: null
  genieacs_mongodb_data: null
  victoriametrics_data: null
  minio_data: null
  loki_data: null
  grafana_data: null
networks:
  default:
    name: dotmac_sub_default
    ipam:
      config:
      - subnet: 172.20.255.0/24
