x-logging: &id001
  driver: json-file
  options:
    max-size: 10m
    max-file: '3'
x-observability-extra-hosts: &observability_extra_hosts
- observability.dotmac.io:75.119.128.247
services:
  app:
    image: ${APP_IMAGE:?APP_IMAGE must be set in .env to an immutable app image}
    container_name: dotmac_sub_app
    restart: unless-stopped
    mem_limit: 8g
    mem_reservation: 1g
    cpus: 4.0
    pids_limit: 256
    logging: *id001
    extra_hosts: *observability_extra_hosts
    ports:
    - 127.0.0.1:8001:8001
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-840}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-900}
      CELERY_ACS_TASK_SOFT_TIME_LIMIT: ${CELERY_ACS_TASK_SOFT_TIME_LIMIT:-240}
      CELERY_ACS_TASK_TIME_LIMIT: ${CELERY_ACS_TASK_TIME_LIMIT:-300}
      CELERY_LONG_TASK_SOFT_TIME_LIMIT: ${CELERY_LONG_TASK_SOFT_TIME_LIMIT:-1740}
      CELERY_LONG_TASK_TIME_LIMIT: ${CELERY_LONG_TASK_TIME_LIMIT:-1800}
      REDIS_URL: ${REDIS_URL}
      SESSION_REDIS_URL: ${SESSION_REDIS_URL}
      # GenieACS runs network_mode: host, so it has no bridge IP/DNS name.
      # Reach its NBI via the dotmac_sub_default gateway (= host) on the
      # pinned 172.20.255.0/24 subnet rather than the unresolvable "genieacs".
      GENIEACS_NBI_URL: ${GENIEACS_NBI_URL:-http://172.20.255.1:7557}
      WIREGUARD_USE_NSENTER: '1'
      VPN_BLOCKED_LAN_SUBNETS: 172.20.255.0/24
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      OPENBAO_ADDR: ${OPENBAO_ADDR}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN}
      APP_URL: ${APP_URL:-}
      APP_RELEASE: ${APP_RELEASE:-}
      GIT_SHA: ${GIT_SHA:-}
      SERVER_NAME: ${SERVER_NAME:-dotmac-sub-prod}
      GLITCHTIP_DSN: ${GLITCHTIP_DSN:-}
      GLITCHTIP_ENABLED: ${GLITCHTIP_ENABLED:-false}
      LOKI_URL: ${LOKI_URL:-}
    env_file:
    - .env
    cap_add:
    - NET_ADMIN
    privileged: true
    pid: host
    sysctls:
      net.ipv4.ip_forward: '1'
    volumes:
    - /etc/wireguard:/etc/wireguard
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - ./uploads:/app/uploads
    # Migrations are NOT run on boot: a half-applied / multi-head migration
    # state must never crash-loop the live app. Apply them as a controlled,
    # pre-deploy step instead: `make docker-migrate` (or `make prod-migrate`).
    command:
    - /bin/sh
    - -c
    - uvicorn app.main:app --host 0.0.0.0 --port 8001 --no-access-log
      --workers ${WEB_CONCURRENCY:-1}
  redis-local:
    image: redis:7-alpine
    container_name: dotmac_redis_local
    restart: unless-stopped
    mem_limit: 1g
    command: ["sh", "-c", "redis-server --appendonly yes --maxmemory 768mb --maxmemory-policy noeviction --requirepass $$REDIS_LOCAL_PASSWORD"]
    environment:
      REDIS_LOCAL_PASSWORD: ${REDIS_LOCAL_PASSWORD}
    volumes:
    - /var/lib/dotmac-redis-local:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-local:
    image: postgis/postgis:16-3.4-alpine
    container_name: dotmac_pg_local
    restart: unless-stopped
    mem_limit: 6g
    shm_size: 1g
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_LOCAL_BOOTSTRAP_PASSWORD}
      POSTGRES_DB: postgres
    command:
    - postgres
    - -c
    - shared_buffers=2GB
    - -c
    - effective_cache_size=6GB
    - -c
    - work_mem=32MB
    - -c
    - maintenance_work_mem=512MB
    - -c
    - statement_timeout=120000
    - -c
    - lock_timeout=10000
    - -c
    - idle_in_transaction_session_timeout=120000
    - -c
    - wal_level=replica
    - -c
    - max_wal_senders=5
    - -c
    - max_replication_slots=5
    - -c
    # Cap WAL a replication slot can pin on the primary, so a disconnected /
    # lagging standby can't grow pg_wal unbounded and fill the disk. Beyond
    # this the slot is invalidated (standby needs re-seed) but the primary
    # stays safe.
    - max_slot_wal_keep_size=50GB
    - -c
    - archive_mode=off
    - -c
    - "archive_command=/bin/true"
    - -c
    - archive_timeout=300
    volumes:
    - /var/lib/dotmac-pg-local:/var/lib/postgresql/data
    ports:
    - 9001:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    image: ${APP_IMAGE:?APP_IMAGE must be set in .env to an immutable app image}
    container_name: dotmac_sub_celery_worker
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 1g
    cpus: 2.0
    pids_limit: 128
    logging: *id001
    extra_hosts: *observability_extra_hosts
    environment:
      PYTHONPATH: /app
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-840}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-900}
      CELERY_ACS_TASK_SOFT_TIME_LIMIT: ${CELERY_ACS_TASK_SOFT_TIME_LIMIT:-240}
      CELERY_ACS_TASK_TIME_LIMIT: ${CELERY_ACS_TASK_TIME_LIMIT:-300}
      CELERY_LONG_TASK_SOFT_TIME_LIMIT: ${CELERY_LONG_TASK_SOFT_TIME_LIMIT:-1740}
      CELERY_LONG_TASK_TIME_LIMIT: ${CELERY_LONG_TASK_TIME_LIMIT:-1800}
      REDIS_URL: ${REDIS_URL}
      RADIUS_PROBE_SECRET: ${RADIUS_PROBE_SECRET:-}
      RADIUS_PROBE_PASSWORD: ${RADIUS_PROBE_PASSWORD:-}
      RADIUS_PROBE_CLIENT_SUBNET: ${RADIUS_PROBE_CLIENT_SUBNET:-172.20.0.0/16}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      OPENBAO_ADDR: ${OPENBAO_ADDR}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN}
      APP_RELEASE: ${APP_RELEASE:-}
      GIT_SHA: ${GIT_SHA:-}
      NETWORK_MONITORING_MAX_WORKERS: ${NETWORK_MONITORING_MAX_WORKERS:-4}
      # Persist router SSH known_hosts on a named volume so first-seen host keys
      # (TOFU) survive container recreation; a CHANGED key is then rejected as an
      # MITM guard. On the ephemeral container layer this would re-pin each
      # deploy and lose that cross-restart protection.
      ROUTER_CONFIG_SSH_KNOWN_HOSTS_PATH: /var/lib/dotmac/router_known_hosts
    env_file:
    - .env
    volumes:
    - ./uploads:/app/uploads
    # dotmac-ops SSH key for RouterOS config-snapshot export (SSH /export).
    # Place the key at ./secrets/dotmac-ops.key on the host (gitignored).
    - ${ROUTER_CONFIG_SSH_KEY_HOST:-./secrets/dotmac-ops.key}:/etc/dotmac/dotmac-ops.key:ro
    - dotmac_router_ssh:/var/lib/dotmac
    command:
    - celery
    - -A
    - app.celery_app.celery_app
    - worker
    - --loglevel=info
    # 3 processes: the default queue mixes long jobs with
    # short periodic ones; at 2, one long job halves throughput and the
    # queue grows faster than it drains.
    - --concurrency=3
    - --max-tasks-per-child=50
    - -Q
    - celery,nin,crm
  celery-worker-tr069:
    image: ${APP_IMAGE:?APP_IMAGE must be set in .env to an immutable app image}
    container_name: dotmac_sub_celery_worker_tr069
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 512m
    cpus: 1.0
    pids_limit: 96
    logging: *id001
    extra_hosts: *observability_extra_hosts
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-840}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-900}
      CELERY_ACS_TASK_SOFT_TIME_LIMIT: ${CELERY_ACS_TASK_SOFT_TIME_LIMIT:-240}
      CELERY_ACS_TASK_TIME_LIMIT: ${CELERY_ACS_TASK_TIME_LIMIT:-300}
      CELERY_LONG_TASK_SOFT_TIME_LIMIT: ${CELERY_LONG_TASK_SOFT_TIME_LIMIT:-1740}
      CELERY_LONG_TASK_TIME_LIMIT: ${CELERY_LONG_TASK_TIME_LIMIT:-1800}
      REDIS_URL: ${REDIS_URL}
      # GenieACS runs network_mode: host, so it has no bridge IP/DNS name.
      # Reach its NBI via the dotmac_sub_default gateway (= host) on the
      # pinned 172.20.255.0/24 subnet rather than the unresolvable "genieacs".
      GENIEACS_NBI_URL: ${GENIEACS_NBI_URL:-http://172.20.255.1:7557}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      OPENBAO_ADDR: ${OPENBAO_ADDR}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN}
      APP_RELEASE: ${APP_RELEASE:-}
      GIT_SHA: ${GIT_SHA:-}
      NETWORK_MONITORING_MAX_WORKERS: ${NETWORK_MONITORING_MAX_WORKERS:-4}
    env_file:
    - .env
    volumes:
    - ./uploads:/app/uploads
    command:
    - celery
    - -A
    - app.celery_app.celery_app
    - worker
    - --loglevel=info
    - --concurrency=2
    - --max-tasks-per-child=50
    - -Q
    - tr069,acs
  celery-worker-bandwidth:
    image: ${APP_IMAGE:?APP_IMAGE must be set in .env to an immutable app image}
    container_name: dotmac_sub_celery_worker_bandwidth
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 512m
    cpus: 0.5
    pids_limit: 64
    logging: *id001
    extra_hosts: *observability_extra_hosts
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      REDIS_URL: ${REDIS_URL}
      VICTORIAMETRICS_URL: http://victoriametrics:8428
      RADIUS_PROBE_SECRET: ${RADIUS_PROBE_SECRET:-}
      RADIUS_PROBE_PASSWORD: ${RADIUS_PROBE_PASSWORD:-}
      RADIUS_PROBE_HOST: ${RADIUS_PROBE_HOST:-freeradius}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      OPENBAO_ADDR: ${OPENBAO_ADDR}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN}
      APP_RELEASE: ${APP_RELEASE:-}
      GIT_SHA: ${GIT_SHA:-}
    env_file:
    - .env
    depends_on:
      victoriametrics:
        condition: service_started
    volumes:
    - ./uploads:/app/uploads
    command:
    - celery
    - -A
    - app.celery_app.celery_app
    - worker
    - --loglevel=info
    - --concurrency=3
    - --max-tasks-per-child=100
    - -Q
    - bandwidth,ingestion

  # Consumer for the `billing` queue (daily invoice cycle,
  # dunning, autopay, payment-topup reconciliation, usage/FUP, expiry,
  # suspension audit, billing-switch guard). Isolated from the default worker
  # so a long billing run never starves periodic tasks. Money-moving tasks are
  # gated by `billing_enabled` and no-op until cutover; this worker simply
  # ensures the queue is consumed (previously it had no consumer → all dropped).
  celery-worker-billing:
    image: ${APP_IMAGE:?APP_IMAGE must be set in .env to an immutable app image}
    container_name: dotmac_sub_celery_worker_billing
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 256m
    cpus: 0.5
    pids_limit: 64
    logging: *id001
    extra_hosts: *observability_extra_hosts
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      REDIS_URL: ${REDIS_URL}
      VICTORIAMETRICS_URL: http://victoriametrics:8428
      OPENBAO_ADDR: ${OPENBAO_ADDR}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN}
      APP_RELEASE: ${APP_RELEASE:-}
      GIT_SHA: ${GIT_SHA:-}
    env_file:
    - .env
    volumes:
    - ./uploads:/app/uploads
    command:
    - celery
    - -A
    - app.celery_app.celery_app
    - worker
    - --loglevel=info
    - --concurrency=2
    - --max-tasks-per-child=50
    - -Q
    - billing
  celery-beat:
    image: ${APP_IMAGE:?APP_IMAGE must be set in .env to an immutable app image}
    container_name: dotmac_sub_celery_beat
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5
    pids_limit: 64
    logging: *id001
    extra_hosts: *observability_extra_hosts
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      OPENBAO_ADDR: ${OPENBAO_ADDR}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN}
      APP_RELEASE: ${APP_RELEASE:-}
      GIT_SHA: ${GIT_SHA:-}
    env_file:
    - .env
    volumes: []
    command:
    - celery
    - -A
    - app.celery_app.celery_app
    - beat
    - --loglevel=info
  nominatim:
    image: mediagis/nominatim:4.4
    container_name: dotmac_sub_nominatim
    restart: unless-stopped
    mem_limit: 8g
    mem_reservation: 2g
    cpus: 2.0
    pids_limit: 256
    environment:
      PBF_URL: https://download.geofabrik.de/africa/nigeria-latest.osm.pbf
      IMPORT_STYLE: extratags
      THREADS: "2"
    ports:
    - 127.0.0.1:8088:8080
    volumes:
    - nominatim_data:/var/lib/postgresql/14/main
    - nominatim_flatnode:/var/lib/nominatim/flatnode
  freeradius:
    image: freeradius/freeradius-server:3.2.7
    container_name: dotmac_sub_freeradius
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 1.0
    pids_limit: 64
    logging: *id001
    ports:
    - 1812:1812/udp
    - 1813:1813/udp
    - 1822:1822/udp
    - 1823:1823/udp
    volumes:
    - ./config/freeradius/radiusd.conf:/etc/freeradius/radiusd.conf:ro
    - ./config/freeradius/mods-enabled/sql:/etc/raddb/mods-enabled/sql:ro
    - ./config/freeradius/mods-enabled/sql_admin:/etc/raddb/mods-enabled/sql_admin:ro
    - ./config/freeradius/sites-enabled/default:/etc/raddb/sites-enabled/default:ro
    - ./config/freeradius/sites-enabled/admin-login:/etc/raddb/sites-enabled/admin-login:ro
    - ./config/freeradius/dictionary.mikrotik:/etc/raddb/dictionary.mikrotik
    - ./config/freeradius/dictionary:/etc/raddb/dictionary
    environment:
    - RADIUS_DB_HOST=${RADIUS_DB_HOST:-radius-db}
    - RADIUS_DB_PORT=${RADIUS_DB_PORT:-5432}
    - RADIUS_DB_NAME=${RADIUS_DB_NAME:-radius}
    - RADIUS_DB_USER=${RADIUS_DB_USER:-postgres}
    - RADIUS_DB_PASS=${RADIUS_DB_PASS}
    # Shared secret for the admin-login realm (1822/1823) clients; each router's
    # /radius service=login entry must use the same value.
    - ADMIN_RADIUS_SECRET=${ADMIN_RADIUS_SECRET}
  genieacs:
    build:
      context: .
      dockerfile: docker/genieacs/Dockerfile
    image: dotmac_sub-genieacs:1.2.13
    container_name: dotmac_sub_genieacs
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 1g
    cpus: 2.0
    pids_limit: 1024
    logging: *id001
    network_mode: host
    depends_on:
    - genieacs-mongodb
    environment:
    - GENIEACS_MONGODB_CONNECTION_URL=mongodb://genieacs:${GENIEACS_MONGODB_PASSWORD}@127.0.0.1:27017/genieacs?authSource=admin
    - GENIEACS_UI_JWT_SECRET=${GENIEACS_UI_JWT_SECRET}
    - TR069_AUTH_SHARED_SECRET=${TR069_AUTH_SHARED_SECRET}
    - GENIEACS_CWMP_WORKER_PROCESSES=${GENIEACS_CWMP_WORKER_PROCESSES:-1}
    - GENIEACS_NBI_WORKER_PROCESSES=${GENIEACS_NBI_WORKER_PROCESSES:-1}
    - GENIEACS_FS_WORKER_PROCESSES=${GENIEACS_FS_WORKER_PROCESSES:-1}
    - GENIEACS_UI_WORKER_PROCESSES=${GENIEACS_UI_WORKER_PROCESSES:-1}
    - GENIEACS_UI_INTERFACE=127.0.0.1
    - GENIEACS_EXT_TIMEOUT=15000
    - GENIEACS_DEBUG_FILE=/var/log/genieacs/debug.yaml
    - GENIEACS_CWMP_LOG_FILE=/var/log/genieacs/cwmp.log
    - NODE_OPTIONS=--enable-source-maps
    - DOTMAC_WEBHOOK_URL=http://127.0.0.1:8001/api/v1/tr069/inform
    - DOTMAC_AUTH_URL=http://127.0.0.1:8001/api/v1/tr069/auth
    volumes:
    - ./docker/genieacs/ext:/opt/genieacs/ext:ro
    - ./docker/genieacs/provisions:/opt/genieacs/provisions:ro
    - ./docker/genieacs/virtual-parameters:/opt/genieacs/virtual-parameters:ro
  genieacs-mongodb:
    image: mongo:4.4
    container_name: dotmac_sub_genieacs_mongodb
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 512m
    cpus: 1.0
    pids_limit: 256
    environment:
      MONGO_INITDB_ROOT_USERNAME: genieacs
      MONGO_INITDB_ROOT_PASSWORD: ${GENIEACS_MONGODB_PASSWORD}
    ports:
    - 127.0.0.1:27017:27017
    volumes:
    - genieacs_mongodb_data:/data/db
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.96.0
    container_name: dotmac_sub_victoriametrics
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 1.0
    pids_limit: 64
    ports:
    - 127.0.0.1:8428:8428
    volumes:
    - victoriametrics_data:/victoria-metrics-data
    command:
    - -retentionPeriod=365d
    - -search.maxUniqueTimeseries=1000000
  promtail:
    image: grafana/promtail:3.0.0
    container_name: dotmac_sub_promtail
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.5
    pids_limit: 64
    volumes:
    - ./config/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    - promtail_positions:/positions
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
  bandwidth-poller:
    image: ${APP_IMAGE:?APP_IMAGE must be set in .env to an immutable app image}
    container_name: dotmac_sub_bandwidth_poller
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 1.0
    pids_limit: 96
    logging: *id001
    extra_hosts: *observability_extra_hosts
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      VICTORIAMETRICS_URL: http://victoriametrics:8428
      BANDWIDTH_POLLING_ENABLED: 'true'
      BANDWIDTH_POLL_INTERVAL_MS: '30000'
      BANDWIDTH_HOT_RETENTION_HOURS: '24'
      BANDWIDTH_REDIS_STREAM: bandwidth:samples
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      OPENBAO_ADDR: ${OPENBAO_ADDR}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN}
      WIREGUARD_USE_NSENTER: '1'
    env_file:
    - .env
    depends_on:
      victoriametrics:
        condition: service_started
    cap_add:
    - NET_ADMIN
    privileged: true
    pid: host
    volumes:
    - /etc/wireguard:/etc/wireguard
    command:
    - python
    - -m
    - app.poller
  syslog-listener:
    image: ${APP_IMAGE:?APP_IMAGE must be set in .env to an immutable app image}
    container_name: dotmac_sub_syslog_listener
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    cpus: 0.5
    pids_limit: 64
    logging: *id001
    extra_hosts: *observability_extra_hosts
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SYSLOG_ENABLED: ${SYSLOG_ENABLED:-true}
      SYSLOG_LISTEN_HOST: 0.0.0.0
      SYSLOG_LISTEN_PORT: '514'
      AUTOFIND_COOLDOWN_SECONDS: ${AUTOFIND_COOLDOWN_SECONDS:-30}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      OPENBAO_ADDR: ${OPENBAO_ADDR}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN}
      APP_RELEASE: ${APP_RELEASE:-}
      GIT_SHA: ${GIT_SHA:-}
    env_file:
    - .env
    ports:
    - 514:514/udp
    volumes: []
    command:
    - python
    - -m
    - app.syslog
  vmagent:
    image: victoriametrics/vmagent:v1.96.0
    container_name: dotmac_vmagent
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    cpus: 0.5
    pids_limit: 64
    command:
    - -promscrape.config=/etc/vmagent/config.yml
    - -remoteWrite.url=http://victoriametrics:8428/api/v1/write
    volumes:
    - ./config/vmagent/config.yml:/etc/vmagent/config.yml:ro
    depends_on:
      victoriametrics:
        condition: service_started
volumes:
  dotmac_sub_db_data: null
  nominatim_data: null
  nominatim_flatnode: null
  radius_db_data: null
  genieacs_mongodb_data: null
  victoriametrics_data: null
  promtail_positions: null
  dotmac_router_ssh: null
networks:
  default:
    name: dotmac_sub_default
    ipam:
      config:
      - subnet: 172.20.255.0/24
