# Default logging configuration to prevent disk exhaustion
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    build: .
    container_name: dotmac_sub_app
    restart: unless-stopped
    mem_limit: 1536m
    mem_reservation: 512m
    cpus: 2.0
    pids_limit: 256
    logging: *default-logging
    ports:
    - 127.0.0.1:8001:8001
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/dotmac_sub
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-840}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-900}
      CELERY_ACS_TASK_SOFT_TIME_LIMIT: ${CELERY_ACS_TASK_SOFT_TIME_LIMIT:-240}
      CELERY_ACS_TASK_TIME_LIMIT: ${CELERY_ACS_TASK_TIME_LIMIT:-300}
      CELERY_LONG_TASK_SOFT_TIME_LIMIT: ${CELERY_LONG_TASK_SOFT_TIME_LIMIT:-1740}
      CELERY_LONG_TASK_TIME_LIMIT: ${CELERY_LONG_TASK_TIME_LIMIT:-1800}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SESSION_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      WIREGUARD_USE_NSENTER: '1'
      VPN_BLOCKED_LAN_SUBNETS: 172.20.255.0/24
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      SPLYNX_MYSQL_PASS: ${SPLYNX_MYSQL_PASS:-}
      SPLYNX_MYSQL_PASSWORD: ${SPLYNX_MYSQL_PASSWORD:-}
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: dotmac-sub-dev-token
      APP_RELEASE: ${APP_RELEASE:-}
      GIT_SHA: ${GIT_SHA:-}
      # Monitoring
      SERVER_NAME: ${SERVER_NAME:-dotmac-sub-prod}
      GLITCHTIP_DSN: ${GLITCHTIP_DSN:-}
    env_file:
    - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      openbao:
        condition: service_healthy
    cap_add:
    - NET_ADMIN
    privileged: true
    pid: host
    sysctls:
      net.ipv4.ip_forward: '1'
    volumes:
    - /etc/wireguard:/etc/wireguard
    - ./app:/app/app
    - ./templates:/app/templates
    - ./static:/app/static
    - ./alembic:/app/alembic
    - ./scripts:/app/scripts
    - ./uploads:/app/uploads
    command:
    - /bin/sh
    - -c
    - alembic upgrade heads && uvicorn app.main:app --host 0.0.0.0 --port 8001 --no-access-log --workers ${WEB_CONCURRENCY:-1}
  celery-worker:
    build: .
    container_name: dotmac_sub_celery_worker
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 1g
    cpus: 2.0
    pids_limit: 128
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/dotmac_sub
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-840}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-900}
      CELERY_ACS_TASK_SOFT_TIME_LIMIT: ${CELERY_ACS_TASK_SOFT_TIME_LIMIT:-240}
      CELERY_ACS_TASK_TIME_LIMIT: ${CELERY_ACS_TASK_TIME_LIMIT:-300}
      CELERY_LONG_TASK_SOFT_TIME_LIMIT: ${CELERY_LONG_TASK_SOFT_TIME_LIMIT:-1740}
      CELERY_LONG_TASK_TIME_LIMIT: ${CELERY_LONG_TASK_TIME_LIMIT:-1800}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-dotmac-private}
      S3_REGION: ${S3_REGION:-us-east-1}
      SPLYNX_MYSQL_PASS: ${SPLYNX_MYSQL_PASS:-}
      SPLYNX_MYSQL_PASSWORD: ${SPLYNX_MYSQL_PASSWORD:-}
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: dotmac-sub-dev-token
      APP_RELEASE: ${APP_RELEASE:-}
      GIT_SHA: ${GIT_SHA:-}
      NETWORK_MONITORING_MAX_WORKERS: ${NETWORK_MONITORING_MAX_WORKERS:-4}
    env_file:
    - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      openbao:
        condition: service_healthy
    volumes:
    - ./app:/app/app
    - ./uploads:/app/uploads
    command:
    - celery
    - -A
    - app.celery_app.celery_app
    - worker
    - --loglevel=info
    - --concurrency=2
    - --max-tasks-per-child=50
    - -Q
    - celery
