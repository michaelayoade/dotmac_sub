name: dotmac_field
description: "DotMac field technician app."
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^16.0.0
  dio: ^5.7.0
  drift: ^2.28.0
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.27
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.1.0
  url_launcher: ^6.3.0
  uuid: ^4.5.1
  intl: ^0.20.0
  path_provider: ^2.1.4
  path: ^1.9.0
  image_picker: ^1.1.2
  image: ^4.2.0
  flutter_map: ^8.1.0
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  speech_to_text: ^7.0.0
  sentry_flutter: ^9.22.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Screenshot harness (App Store / Play listing captures). See
  # integration_test/screenshots_test.dart + tool/screenshots.sh.
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.28.0
  build_runner: ^2.7.0
  # Generates native splash screens from the brand assets below
  # (`dart run flutter_native_splash:create` after changing them).
  flutter_native_splash: ^2.4.1
  # Generates launcher icons from the square brand icon below
  # (`dart run flutter_launcher_icons` after changing it).
  flutter_launcher_icons: ^0.14.1

# Launcher icon: the Dotmac square brand icon (green rounded square, white "D").
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: assets/images/app_icon.png
  remove_alpha_ios: true

# Splash: Dotmac wordmark centered on white; Android 12+ uses the square icon
# (its splash style masks a centered icon, not a wordmark).
flutter_native_splash:
  color: "#ffffff"
  image: assets/images/login_logo.png
  android_12:
    color: "#ffffff"
    image: assets/images/app_icon.png

flutter:
  uses-material-design: true

  # Dotmac brand assets (launcher-icon source + login wordmark).
  assets:
    - assets/images/
