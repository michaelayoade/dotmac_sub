# vmagent configuration: scrape app/infra metrics into VictoriaMetrics

global:
  scrape_interval: 60s
  scrape_timeout: 30s

scrape_configs:
  # DotMac app health endpoint
  - job_name: 'dotmac-app'
    metrics_path: /metrics
    static_configs:
      - targets: ['app:8001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'dotmac-app'
