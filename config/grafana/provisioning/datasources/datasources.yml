apiVersion: 1

datasources:
  # Loki for log aggregation
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        # Link device_id to GenieACS UI
        - name: GenieACS Device
          matcherRegex: 'device_id=([^\s,]+)'
          url: 'http://localhost:3000/#!/devices/$${__value.raw}'
          datasourceUid: loki
        # Link container to Docker logs
        - name: Container
          matcherRegex: 'container=([^\s,]+)'
          url: ''

  # VictoriaMetrics for metrics
  - name: VictoriaMetrics
    type: prometheus
    uid: victoriametrics
    access: proxy
    url: http://victoriametrics:8428
    isDefault: false
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # PostgreSQL for direct database queries (optional)
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: db:5432
    database: dotmac_sub
    user: ${POSTGRES_USER}
    editable: false
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
