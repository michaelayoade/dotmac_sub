name: dotmac_portal
description: DotMac customer self-care mobile app (Flutter).
publish_to: "none"
version: 1.9.0+17

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management + DI
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.5.0

  # Live-chat realtime transport (CRM widget /ws/widget): instant messages,
  # "agent is typing", and "Seen" without poll lag.
  web_socket_channel: ^3.0.1

  # Routing
  go_router: ^14.2.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # App-support directory for the on-disk response cache (SWR fallback)
  path_provider: ^2.1.0

  # Biometric app-lock (Face ID / fingerprint) gating the stored session
  local_auth: ^2.3.0

  # In-app provider checkout (Paystack / Flutterwave inline)
  webview_flutter: ^4.8.0

  # OS-level deep links: catch the payment gateway's <scheme>://success|cancel
  # return when a 3-D Secure / bank flow leaves the in-app WebView.
  app_links: ^6.3.2

  # Avatar image picking (gallery / camera)
  image_picker: ^1.1.2

  # Push notifications (FCM). Inert until the platform config files exist
  # (android/app/google-services.json, ios/Runner/GoogleService-Info.plist):
  # PushService.init() guards Firebase.initializeApp so a build without config
  # simply runs with push disabled (in-app inbox still works).
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  # Renders FCM data/notification messages while the app is in the foreground.
  flutter_local_notifications: ^17.2.3

  # Crash reporting to your self-hosted GlitchTip (Sentry-protocol compatible).
  # Pure-Dart client (no native plugin); inert unless a GLITCHTIP_DSN is set.
  sentry: ^8.9.0

  # Charts (pure Dart — no native plugin)
  fl_chart: ^0.69.0

  # Formatting (dates, currency)
  intl: ^0.19.0

  # Coverage / fiber-plant map (OSM tiles — no API key needed)
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  # Generates the native splash screens from the brand assets below
  # (`dart run flutter_native_splash:create` after changing them).
  flutter_native_splash: ^2.4.1
  # Generates launcher icons from the square brand icon below
  # (`dart run flutter_launcher_icons` after changing it).
  flutter_launcher_icons: ^0.14.1

# Launcher icon: the same square brand icon the web app serves as its PWA
# icon (static/branding/favicon/icon-512.png).
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: assets/images/app_icon.png
  remove_alpha_ios: true

# Splash: brand wordmark centered on white; Android 12+ uses the square
# brand icon (its splash style masks a centered icon, not a wordmark).
flutter_native_splash:
  color: "#ffffff"
  image: assets/images/login_logo.png
  android_12:
    color: "#ffffff"
    image: assets/images/app_icon.png

flutter:
  uses-material-design: true

  # White-label brand assets. Drop a per-organization `login_logo.png` here to
  # replace the default placeholder icon on the login screen (see login_screen.dart).
  assets:
    - assets/images/
