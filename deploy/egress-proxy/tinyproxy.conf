# Egress allowlist proxy for external connectors (ADR 0005 Phase 4b).
# HTTPS is tunnelled with CONNECT, so TLS is never intercepted: the allowlist
# matches the hostname in the CONNECT request.
# No User/Group drop: --cap-drop=ALL removes SETUID/SETGID, so tinyproxy
# cannot change user and would exit. Rootless Podman already maps
# container-root to an unprivileged host uid, and the container is
# read-only with all capabilities dropped except NET_ADMIN.
Port 8888
Listen 0.0.0.0
Timeout 600
LogLevel Info
MaxClients 50

# Only reachable from the internal connector network, which has no other route.
Allow 0.0.0.0/0

# The allowlist is the entire policy: anything not matched is refused.
FilterDefaultDeny Yes
Filter "/tmp/egress-allowlist"
FilterExtended On

# Tunnelling is limited to HTTPS.
ConnectPort 443
