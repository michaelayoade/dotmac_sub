# Development override — auto-loaded by plain `docker compose` (dev/local only).
#
# Restores `build:` + source bind-mounts on the app-code services so local
# iteration uses the working-tree code without rebuilding the image.
#
# PRODUCTION DOES NOT USE THIS FILE. Prod runs the immutable base alone via
# `docker compose -f docker-compose.yml ...` (see Makefile prod-* targets),
# so prod code comes only from the baked image, never from this checkout.
services:
  app:
    build: .
    volumes:
      - ./app:/app/app
      - ./VERSION:/app/VERSION:ro
      - ./templates:/app/templates
      - ./static:/app/static
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
      - ./tests:/app/tests

  celery-worker:
    build: .
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts

  celery-worker-bandwidth:
    build: .
    volumes:
      - ./app:/app/app

  celery-worker-billing:
    build: .
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts

  celery-worker-tr069:
    build: .
    volumes:
      - ./app:/app/app

  celery-beat:
    build: .
    volumes:
      - ./app:/app/app

  bandwidth-poller:
    build: .
    volumes:
      - ./app:/app/app

  syslog-listener:
    build: .
    volumes:
      - ./app:/app/app
